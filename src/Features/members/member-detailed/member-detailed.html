@if (member() ; as member) {

<div class="flex gap-6">

  <div class="card bg-base-100 shadow-xl w-80 ">
    <div class="pt-6">
      <img
        [src]="member.imageUrl"
        [alt]="member.userName"
        class="w-40 h-40 rounded-full object-cover mx-auto"
      />
    </div>

    <div class="card-body">
      <div class="text-center">
        <h2 class="text-2xl font-bold text-primary">
          {{ member.userName }}, {{member.dateOfBirth|age }}
        </h2>

        <p class="text-base-content/70">
          {{ member.city }}, {{ member.country }}
        </p>
      </div>

      <div class="divider"></div>

      <ul class="menu rounded-box">
        <li><a routerLink="profile" routerLinkActive="text-primary">Profile</a></li>
        <li><a routerLink="photos" routerLinkActive="text-primary">Photos</a></li>
        <li><a routerLink="Messages" routerLinkActive="text-primary">Messages</a></li>
      </ul>

      <div class="card-actions mt-4">
        <button class="btn btn-info flex-1">Go Back</button>
        <button class="btn btn-primary flex-1">Like User</button>
      </div>
    </div>
  </div>

  <div class="card bg-base-100 shadow-xl flex-1 p-6">
     
    <div class="flex  justify-between items-center">
      <h3 class="card-title text-3xl text-primary">{{title()}}</h3>
      @if(isCurrentUser()){
        <button (click)="this.memberService.toggleEditMode()" class="btn btn-primary btn-outline">{{memberService.editMode()?'cancel':'edit'}}</button>
      }
    </div>


    <div class="divider"></div>

    <router-outlet></router-outlet>
  </div>

</div>

} @else {
    <div>Member Not found</div>
}
