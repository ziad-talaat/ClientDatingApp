@if(photos$|async;as photos){
 @if(photos.length>0){
    <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-transparent">
      @for(photo of photos;track photo.id){
        <img [src]="photo.photoUrl">
      }
      @for(photo of photoMock ;track $index){
        <img [src]="photo.url">
      }
    </div>
 }
}
