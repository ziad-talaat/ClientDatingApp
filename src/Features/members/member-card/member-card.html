@if(member();as member){
<div routerLink="/members/{{member.id}}"  class="card cursor-pointer transition-all duration-300  ease-in-out transform hover:-translate-y-1.5">
    <img src="{{member.imageUrl}}" alt="{{member.userName}} image" class="rounded-lg w-full h-80 rounded-lg  object-cover">
    <div class="card-actions  z-40 absolute
     bottom-0 w-full px-3 py-1 rounded-b-lg
         bg-gradient-to-t from-black via-black/75 to-black/0">
        <div class="flex flex-col text-white">

            <span class="font-semibold ">{{member.userName}}, 25</span>
            <span class="text-sm ">{{member.city}}, 25</span>
        </div>
    </div>
</div>

}
