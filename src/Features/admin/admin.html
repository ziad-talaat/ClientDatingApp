<div class="flex flex-col w-full mb-3">
    <div class="flex justify-between items-center">
        <div class="tabs tabs-border tabs-lg text-primary">
            @for(tab of tabs; track $index){
                <a 
                [routerLink]="tab.value === 'photos' ? 'photosManagment' : 'userManagment'"
                 routerLinkActive="tab-active"
                class="tab"
                [hidden]="tab.value==='roles' && !accountService.currentUser()?.role?.includes('Admin')"
                [class.tab-active]="activeTab===tab.value"
                (click)="setTab(tab.value)"
                >{{tab.label}}</a>

            }
        </div>
    </div>
</div>
@if(activeTab==='roles'){
<app-user-managment></app-user-managment>
}
@if(activeTab==='photos'){
    <app-photo-managment></app-photo-managment>
}
