<div class="flex flex-col w-full">
 <div class="flex justify-between items-center">
    <div class="tabs tabs-box tabs-lg text-primary w-fit">
        @for(tab of tabs;track $index){
            <button role="tab" class="tab" [class.tab-active]="container ===tab.value" (click)="setContainer(tab.value)">{{tab.label}}</button>
        }
    </div>
    @if(paginatedMessages(); as metadata){
  <app-paginator 
   [hidden]="metadata.totalItems===0"
   [pageNumber]="metadata.currentPage"
   [pageSize]="metadata.pageSize"
   [totalItems]="metadata.totalItems"
   (pageChange)="onPageChange($event)"
  ></app-paginator>
    }
 </div>
</div>

<div class="overflow-x-auto mt-3">
  <table class="table bg-base-100 table-fixed w-full">
    <thead>
      <tr>
        <th class="w-2/9">Sender/Recipient</th>
        <th class="w-4/9">Message</th>
        <th class="w-2/9">Date</th>
        <th class="w-1/9"></th>
        
      </tr>
    </thead>

    <tbody [class.font-semibold]="isInbox">
     @for(message of paginatedMessages()?.pageResult ;track message.id ){
        <tr [class.font-bold]="isInbox&& !message.dateRead" routerLink='/members/{{isInbox ? message.senderId:message.recipientId}}/Messages' class="hover:bg-base-200 cursor-pointer">
            <td class="w-2/8">
              <div class="flex flex-center gap-3">
                <div class="h-12 w-12 ">
                  <img class="rounded-full " src="{{isInbox?message.senderImageUrl:message.recipientImageUrl}}" alt="image of member">
                </div>
              </div>
              {{ isInbox? message.senderName:message.recipientName}}
            </td>
            <td class="w-4/9 truncate">{{message.content}}</td>
            <td class="w-2/9">{{message.dateSent|date:'medium'}}</td>
            <td class="w-1/9">
              <button (click)="deleteMessage($event,message.id)"
               class="btn btn-circle btn-ghost text-error">
               <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="currentColor"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-30">
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M6 7.5h12m-9.75 0v10.125a1.125 1.125 0 001.125 1.125h5.25a1.125 1.125 0 001.125-1.125V7.5M9.75 7.5V5.625A1.125 1.125 0 0110.875 4.5h2.25A1.125 1.125 0 0114.25 5.625V7.5m-9 0h13.5" />
  </svg> 
              </button>
            </td>

        </tr>
     }


    </tbody>
  </table>
</div>
