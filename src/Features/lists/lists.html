@if(membersPage();as paginatedRsult){
<div class="flex justify-between items-center">

    <div class="tabs tabs-box tabs-lg text-primary w-fit">
        @for(tab of tabs;track $index){
            <button
     role="tab"
      class="tab"
       [class.tab-active]="predicate===tab.value"
        (click)="setPredicate(tab.value)"
       >{{tab.label}}</button>
}

</div>
<app-paginator    [pageNumber]="paginatedRsult.currentPage"
        [pageSize]="paginatedRsult.pageSize"
        [totalItems]="paginatedRsult.totalItems"
        (pageChange)="onPageChange($event)"/>
</div>


    <div class="grid grid-cols-5 gap-6 mt-3">
        @if(paginatedRsult.pageResult.length > 0){
        @for(member of paginatedRsult.pageResult;track member.id){
            <app-member-card [member]="member" />
        }
    }@else {
        <p class="text-gray-600 mt-3 font-semibold text-center">there are no results for this filter</p>
    }
    </div>
}
